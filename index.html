<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Stage Buzzer</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Orbitron Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <!-- PeerJS for WebRTC Connection -->
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    
    <style>
        :root {
            --team-color: #333333;
            --team-shadow: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background-color: #050505;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            color: #ffffff;
            margin: 0;
            overflow: hidden; 
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        .neon-box {
            border: 4px solid var(--team-color);
            box-shadow: 0 0 20px var(--team-shadow), inset 0 0 15px var(--team-shadow);
            background: rgba(10, 10, 15, 0.4);
            backdrop-filter: blur(2px);
            opacity: 0.3;
            transition: all 0.5s ease;
        }

        .neon-box-main {
            border: 8px solid var(--team-color);
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(10px);
            animation: pulse-glow 2.5s infinite alternate;
        }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 20px var(--team-shadow), inset 0 0 20px var(--team-shadow); }
            100% { box-shadow: 0 0 60px var(--team-shadow), inset 0 0 40px var(--team-shadow); }
        }

        .text-glow {
            text-shadow: 0 0 15px var(--team-shadow), 0 0 40px var(--team-shadow);
            color: var(--team-color);
        }

        .hide-card {
            opacity: 0;
            transform: scale(0.8);
            pointer-events: none;
        }

        .show-card {
            opacity: 0.5;
            transform: scale(1);
        }

        .spotlight-active {
            opacity: 1 !important;
        }

        /* Buzzer Button Effects */
        .buzzer-btn {
            box-shadow: 0 10px 0 rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.2);
            transition: all 0.1s;
        }
        .buzzer-btn:active:not(:disabled) {
            transform: translateY(10px);
            box-shadow: 0 0px 0 rgba(0,0,0,0.5), inset 0 0 40px rgba(255,255,255,0.4);
        }

        ::-webkit-scrollbar { height: 6px; width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.5); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen w-screen select-none">

    <!-- Unified Audio Element -->
    <audio id="buzzer-sound" src="buzzer.mp3" preload="auto"></audio>

    <!-- ========================================== -->
    <!-- MOTHER UI (LANDING SCREEN)                 -->
    <!-- ========================================== -->
    <div id="landing-screen" class="absolute inset-0 z-50 flex flex-col items-center justify-center bg-black bg-opacity-90 px-6 backdrop-blur-sm transition-opacity duration-500">
        <h1 class="text-4xl md:text-6xl font-black text-white mb-12 tracking-widest text-center" style="text-shadow: 0 0 20px rgba(255,255,255,0.5);">STAGE BUZZER</h1>
        
        <div class="flex flex-col md:flex-row gap-6 w-full max-w-3xl">
            <!-- Host Button -->
            <button onclick="startHostMode()" class="flex-1 bg-cyan-950 bg-opacity-40 border-2 border-cyan-700 hover:bg-cyan-900 hover:border-cyan-400 rounded-3xl p-8 flex flex-col items-center gap-4 transition-all shadow-[0_0_20px_rgba(34,211,238,0.2)] hover:shadow-[0_0_40px_rgba(34,211,238,0.5)] group">
                <span class="text-6xl group-hover:scale-110 transition-transform">💻</span>
                <span class="text-2xl font-black tracking-widest text-cyan-400">HOST A QUIZ</span>
                <span class="text-xs font-mono text-cyan-200 opacity-70 text-center">Create a quiz and display the main stage screen.</span>
            </button>

            <!-- Participant Button -->
            <button onclick="startParticipantMode()" class="flex-1 bg-purple-950 bg-opacity-40 border-2 border-purple-700 hover:bg-purple-900 hover:border-purple-400 rounded-3xl p-8 flex flex-col items-center gap-4 transition-all shadow-[0_0_20px_rgba(168,85,247,0.2)] hover:shadow-[0_0_40px_rgba(168,85,247,0.5)] group">
                <span class="text-6xl group-hover:scale-110 transition-transform">📱</span>
                <span class="text-lg md:text-xl font-black tracking-widest text-purple-400 text-center">JOIN AS PARTICIPANT/TEAM</span>
                <span class="text-xs font-mono text-purple-200 opacity-70 text-center">Connect your phone to a host quiz as a buzzer.</span>
            </button>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- HOST UI                                    -->
    <!-- ========================================== -->
    <div id="host-screen" class="hidden flex-col h-full w-full relative z-0">
        
        <!-- Network Dashboard Modal -->
        <div id="network-modal" class="fixed inset-0 z-50 bg-black bg-opacity-95 hidden flex-col items-center justify-center backdrop-blur-md px-4">
            <div class="bg-gray-900 border border-gray-700 p-4 md:p-6 rounded-2xl w-full max-w-4xl shadow-2xl">
                <div class="flex justify-between items-center mb-4 md:mb-6 border-b border-gray-700 pb-4">
                    <h2 class="text-xl md:text-2xl font-black text-cyan-400 tracking-widest">HOST DASHBOARD</h2>
                    <button onclick="closeNetwork()" class="text-red-500 font-bold hover:text-red-400">CLOSE [X]</button>
                </div>
                
                <div class="bg-black p-4 rounded-xl border border-cyan-900 mb-6 text-center">
                    <p class="text-gray-400 text-xs md:text-sm tracking-widest mb-2">PARTICIPANTS JOIN USING THIS ROOM ID:</p>
                    <p id="room-code-display" class="text-4xl md:text-6xl font-black text-white tracking-[0.2em] animate-pulse">...</p>
                </div>

                <div class="max-h-[40vh] md:max-h-[50vh] overflow-y-auto pr-2">
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-gray-500 text-[10px] md:text-xs tracking-widest border-b border-gray-800">
                                <th class="pb-2">SLOT</th>
                                <th class="pb-2">TEAM NAME</th>
                                <th class="pb-2 hidden md:table-cell">STATUS</th>
                                <th class="pb-2 text-right">ACTIONS</th>
                            </tr>
                        </thead>
                        <tbody id="participant-list" class="text-xs md:text-sm">
                            <!-- Injected via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- Host Header -->
        <header class="w-full py-2 md:py-3 flex items-center justify-between bg-black bg-opacity-80 border-b border-gray-900 z-10 px-4 md:px-8">
            <div class="w-8 md:w-24"></div> 
            <div class="flex flex-col items-center">
                <h1 class="text-lg md:text-2xl font-black tracking-[0.2em] md:tracking-[0.4em] text-gray-500 uppercase text-center truncate px-2">STAGE BUZZER</h1>
                <p class="text-[10px] md:text-xs text-cyan-400 font-mono tracking-widest mt-1">ROOM: <span id="header-room-code" class="font-bold text-white">...</span></p>
            </div>
            <div class="flex gap-4 w-8 md:w-24 justify-end">
                <button onclick="openNetwork()" class="w-8 h-8 md:w-12 md:h-12 flex items-center justify-center text-cyan-500 hover:bg-gray-800 rounded-full transition-all text-xl" title="Network Dashboard">
                    📡
                </button>
            </div>
        </header>

        <!-- Host Main Content Area -->
        <main class="flex-1 flex flex-col w-full items-center justify-center px-2 md:px-8 py-2 md:py-6 gap-2 md:gap-4 relative overflow-hidden">
            
            <!-- Cards Area (Responsive Stack) -->
            <div class="flex-1 flex flex-row flex-wrap md:flex-nowrap w-full max-w-7xl items-center justify-center gap-2 md:gap-6 min-h-0">
                
                <!-- Main Spotlight Card (Order 1 on mobile, Order 2 on desktop) -->
                <div id="main-card" class="order-1 md:order-2 w-full md:flex-1 md:min-w-[40%] md:max-w-[70%] h-[40vh] md:h-[100%] max-h-[95%] flex flex-col items-center justify-center rounded-[2rem] md:rounded-[3rem] transition-all duration-300 relative overflow-hidden border-2 border-dashed border-gray-800 bg-black bg-opacity-50 spotlight-active px-4">
                    <div class="text-3xl md:text-5xl font-bold tracking-widest mb-4 text-gray-600 text-center">AWAITING CONNECTIONS</div>
                </div>

                <!-- Previous Card (Order 2 on mobile, Order 1 on desktop) -->
                <div id="prev-card" class="order-2 md:order-1 w-[48%] md:w-auto md:flex-[0.4] md:min-w-[15%] md:max-w-[25%] h-[18vh] md:h-[65%] px-2 md:px-6 flex flex-col items-center justify-center rounded-2xl md:rounded-3xl hide-card"></div>

                <!-- Next Card (Order 3 on mobile, Order 3 on desktop) -->
                <div id="next-card" class="order-3 md:order-3 w-[48%] md:w-auto md:flex-[0.4] md:min-w-[15%] md:max-w-[25%] h-[18vh] md:h-[65%] px-2 md:px-6 flex flex-col items-center justify-center rounded-2xl md:rounded-3xl hide-card"></div>
            </div>

            <!-- Full Queue List -->
            <div class="w-full max-w-5xl flex-shrink-0 bg-black bg-opacity-60 border border-gray-800 rounded-xl md:rounded-2xl p-2 md:p-3 flex flex-col items-center gap-1 md:gap-2 mb-1">
                <div class="text-[10px] md:text-xs text-gray-500 tracking-[0.3em] uppercase font-bold">Live Queue</div>
                <div id="queue-list" class="flex gap-2 md:gap-4 items-center justify-center min-h-[3rem] md:min-h-[4rem] w-full overflow-x-auto px-2 py-1">
                    <span class="text-gray-700 font-mono tracking-widest text-xs md:text-sm">EMPTY</span>
                </div>
            </div>
        </main>

        <!-- Host Footer Controls -->
        <footer class="w-full px-2 md:px-8 py-3 flex flex-wrap justify-center md:justify-between items-center bg-black bg-opacity-90 border-t border-gray-900 z-10 gap-y-2 md:gap-0">
            <!-- Lock & Reset -->
            <div class="flex items-center gap-2 w-full md:w-auto justify-center order-1 md:order-2">
                <button id="lock-btn" onclick="toggleLock()" class="flex-1 md:flex-none h-12 md:h-14 px-2 md:px-8 flex items-center justify-center bg-red-950 bg-opacity-30 text-red-500 border border-red-800 font-bold text-xs md:text-xl rounded-lg md:rounded-xl hover:bg-opacity-50 transition-all tracking-widest uppercase">
                    🔒 LOCKED
                </button>
                <button onclick="resetQueue()" class="flex-1 md:flex-none h-12 md:h-14 px-2 md:px-10 flex items-center justify-center bg-cyan-950 bg-opacity-30 text-cyan-400 border border-cyan-800 font-bold text-xs md:text-xl rounded-lg md:rounded-xl hover:bg-opacity-50 transition-all tracking-widest uppercase">
                    RESET (ESC)
                </button>
            </div>

            <!-- Navigation -->
            <div class="flex items-center justify-between w-full md:w-auto order-2 md:order-1 gap-2 md:gap-0">
                <button onclick="goPrev()" class="flex-1 md:flex-none h-10 md:h-14 px-4 md:px-8 flex items-center justify-center bg-gray-900 bg-opacity-50 text-gray-400 font-bold text-xs md:text-lg rounded-lg md:rounded-xl hover:bg-gray-800 hover:text-white transition-all tracking-widest border border-gray-800 uppercase">
                    &larr; PREV
                </button>
                <div class="hidden md:block w-4 order-2"></div>
                <button onclick="goNext()" class="flex-1 md:flex-none md:order-3 h-10 md:h-14 px-4 md:px-8 flex items-center justify-center bg-gray-900 bg-opacity-50 text-gray-400 font-bold text-xs md:text-lg rounded-lg md:rounded-xl hover:bg-gray-800 hover:text-white transition-all tracking-widest border border-gray-800 uppercase">
                    NEXT &rarr;
                </button>
            </div>
        </footer>
    </div>

    <!-- ========================================== -->
    <!-- PARTICIPANT UI                             -->
    <!-- ========================================== -->
    <div id="participant-screen" class="hidden flex-col h-full w-full relative z-0">
        
        <!-- Setup Screen -->
        <div id="participant-setup" class="absolute inset-0 z-50 bg-black flex flex-col items-center justify-center px-6 bg-cover bg-center" style="background-image: radial-gradient(circle, rgba(168,85,247,0.1) 0%, transparent 70%);">
            <h1 class="text-3xl font-black tracking-widest text-purple-500 mb-8 text-center drop-shadow-[0_0_10px_rgba(168,85,247,0.5)]">JOIN BUZZER</h1>
            
            <div class="w-full max-w-sm space-y-5">
                <div>
                    <label class="text-xs text-gray-400 tracking-widest block mb-2">HOST ROOM CODE</label>
                    <input type="text" id="input-code" class="w-full bg-gray-900 border-2 border-gray-700 rounded-xl p-4 text-white text-2xl text-center font-black uppercase focus:border-purple-500 outline-none transition-colors" placeholder="e.g. PIZZA" maxlength="6">
                </div>
                
                <div>
                    <label class="text-xs text-gray-400 tracking-widest block mb-2">YOUR TEAM NAME</label>
                    <input type="text" id="input-name" class="w-full bg-gray-900 border-2 border-gray-700 rounded-xl p-4 text-white text-xl font-bold uppercase focus:border-purple-500 outline-none transition-colors" placeholder="Team Alpha" maxlength="20">
                </div>

                <div>
                    <label class="text-xs text-gray-400 tracking-widest block mb-2">SELECT SLOT (1-10)</label>
                    <select id="input-slot" class="w-full bg-gray-900 border-2 border-gray-700 rounded-xl p-4 text-white text-xl font-bold focus:border-purple-500 outline-none transition-colors">
                        <option value="1">Slot 1</option><option value="2">Slot 2</option><option value="3">Slot 3</option>
                        <option value="4">Slot 4</option><option value="5">Slot 5</option><option value="6">Slot 6</option>
                        <option value="7">Slot 7</option><option value="8">Slot 8</option><option value="9">Slot 9</option>
                        <option value="10">Slot 10</option>
                    </select>
                </div>

                <button id="join-btn" onclick="connectToHost()" class="w-full mt-4 bg-purple-600 text-white font-black text-xl tracking-widest py-5 rounded-xl border-b-4 border-purple-800 active:translate-y-1 active:border-b-0 transition-all shadow-[0_0_15px_rgba(168,85,247,0.4)]">
                    CONNECT TO HOST
                </button>
                <p id="error-msg" class="text-red-500 text-center text-sm font-bold mt-2 h-4"></p>
                <button onclick="location.reload()" class="w-full text-gray-500 text-sm tracking-widest mt-4 hover:text-white transition-colors">← BACK TO MAIN MENU</button>
            </div>
        </div>

        <!-- Buzzer Screen (Hidden initially) -->
        <div id="participant-buzzer" class="hidden flex-col h-full w-full relative">
            <header class="py-4 text-center bg-black bg-opacity-50 border-b border-white border-opacity-20 absolute top-0 w-full z-10">
                <h2 id="display-name" class="text-2xl font-black tracking-widest uppercase text-white shadow-black drop-shadow-lg px-4 truncate">TEAM</h2>
                <p id="display-status" class="text-sm font-mono tracking-[0.2em] text-white opacity-80 mt-1">CONNECTED TO HOST</p>
            </header>

            <main class="flex-1 flex items-center justify-center p-6 mt-16 pb-20">
                <button id="huge-buzzer" onclick="sendBuzz()" class="buzzer-btn w-full max-w-md aspect-square rounded-[3rem] border-8 border-white border-opacity-30 bg-gray-800 text-white font-black text-5xl tracking-widest uppercase flex flex-col items-center justify-center gap-4 transition-colors duration-300">
                    <span id="buzzer-text">LOCKED</span>
                    <svg id="buzzer-icon" xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </button>
            </main>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- GLOBAL APPLICATION LOGIC                   -->
    <!-- ========================================== -->
    <script>
        // --- Shared Audio Unlock ---
        function unlockAudio() {
            const audio = document.getElementById('buzzer-sound');
            if (audio) {
                audio.volume = 0;
                audio.play().then(() => {
                    audio.pause();
                    audio.currentTime = 0;
                    audio.volume = 1;
                }).catch(e => console.log("Audio unlock pending interaction."));
            }
        }

        function playSound() {
            const audio = document.getElementById('buzzer-sound');
            if(audio) {
                audio.currentTime = 0;
                audio.play().catch(e => console.log("Playback failed", e));
            }
        }

        // --- Mode Switching ---
        function startHostMode() {
            unlockAudio();
            document.getElementById('landing-screen').classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                document.getElementById('landing-screen').classList.add('hidden');
                document.getElementById('host-screen').classList.replace('hidden', 'flex');
                initHostNetwork();
            }, 500);
        }

        function startParticipantMode() {
            unlockAudio();
            document.getElementById('landing-screen').classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                document.getElementById('landing-screen').classList.add('hidden');
                document.getElementById('participant-screen').classList.replace('hidden', 'flex');
            }, 500);
        }

        // ==========================================
        // HOST LOGIC
        // ==========================================
        let hostPeer = null;
        let hostId = "";
        let hostQueue = [];
        let hostCurrentIndex = -1;
        let hostLocked = true;
        let hostCooldowns = {};
        const HOST_COOLDOWN_SEC = 5;
        let pConnections = {}; 
        let pData = {}; 

        const FAST_FOODS = ["JUICE", "BURGER", "PIZZA", "PASTA", "CHICK", "FRIES", "TACO", "DONUT", "SODA", "SUSHI", "WRAP", "SALAD", "BACON", "BREAD"];

        const SLOT_COLORS = {
            '1': { color: '#ff003c', shadow: 'rgba(255, 0, 60, 0.7)' },
            '2': { color: '#00f0ff', shadow: 'rgba(0, 240, 255, 0.7)' },
            '3': { color: '#00ff66', shadow: 'rgba(0, 255, 102, 0.7)' },
            '4': { color: '#ffea00', shadow: 'rgba(255, 234, 0, 0.7)' },
            '5': { color: '#ff00ff', shadow: 'rgba(255, 0, 255, 0.7)' },
            '6': { color: '#ff8800', shadow: 'rgba(255, 136, 0, 0.7)' },
            '7': { color: '#ff66b2', shadow: 'rgba(255, 102, 178, 0.7)' },
            '8': { color: '#9d00ff', shadow: 'rgba(157, 0, 255, 0.7)' },
            '9': { color: '#00ffd5', shadow: 'rgba(0, 255, 213, 0.7)' },
            '10':{ color: '#ffffff', shadow: 'rgba(255, 255, 255, 0.7)' }
        };

        function initHostNetwork() {
            // Pick a random fast-food word (all are 4-6 letters)
            hostId = FAST_FOODS[Math.floor(Math.random() * FAST_FOODS.length)];

            document.getElementById('room-code-display').innerText = hostId;
            document.getElementById('header-room-code').innerText = hostId;

            hostPeer = new Peer('buzzer-host-' + hostId);

            hostPeer.on('open', (id) => { console.log('Host ID: ' + id); updateHostUI(); });

            hostPeer.on('connection', (conn) => {
                conn.on('data', (data) => {
                    if (data.type === 'join') {
                        const slot = data.slot.toString();
                        if (pData[slot] && pData[slot].peerId !== conn.peer) {
                            conn.send({ type: 'rejected', message: 'Slot already taken.' });
                            return;
                        }
                        pData[slot] = { name: data.name.toUpperCase(), ...SLOT_COLORS[slot], peerId: conn.peer };
                        pConnections[slot] = conn;
                        conn.send({ type: 'accepted', slot: slot, color: SLOT_COLORS[slot].color, locked: hostLocked });
                        renderDashboard();
                    } else if (data.type === 'buzz') {
                        let buzzedSlot = Object.keys(pConnections).find(key => pConnections[key].peer === conn.peer);
                        if (buzzedSlot) handleHostBuzz(buzzedSlot);
                    }
                });
                conn.on('close', () => {
                    let slot = Object.keys(pConnections).find(key => pConnections[key].peer === conn.peer);
                    if (slot) kickParticipant(slot);
                });
            });
        }

        function broadcastState() {
            for (let slot in pConnections) {
                if (pConnections[slot].open) pConnections[slot].send({ type: 'state', locked: hostLocked });
            }
        }

        function openNetwork() { document.getElementById('network-modal').classList.replace('hidden', 'flex'); renderDashboard(); }
        function closeNetwork() { document.getElementById('network-modal').classList.replace('flex', 'hidden'); }

        function renderDashboard() {
            const tbody = document.getElementById('participant-list');
            tbody.innerHTML = '';
            for(let i=1; i<=10; i++) {
                const slot = i.toString();
                const p = pData[slot];
                if (p) {
                    tbody.innerHTML += `
                        <tr class="border-b border-gray-800 hover:bg-gray-900 transition-colors">
                            <td class="py-3"><span class="px-3 py-1 rounded-md font-bold text-black" style="background:${p.color}">${slot}</span></td>
                            <td class="py-3 font-bold text-white">${p.name}</td>
                            <td class="py-3 text-green-500 font-mono text-[10px] md:text-xs hidden md:table-cell">CONNECTED</td>
                            <td class="py-3 text-right">
                                <button onclick="handleHostBuzz('${slot}')" class="px-2 md:px-3 py-1 bg-cyan-900 text-cyan-300 rounded text-[10px] md:text-xs mr-1 md:mr-2 hover:bg-cyan-800">BUZZ</button>
                                <button onclick="kickParticipant('${slot}')" class="px-2 md:px-3 py-1 bg-red-900 text-red-300 rounded text-[10px] md:text-xs hover:bg-red-800">KICK</button>
                            </td>
                        </tr>`;
                } else {
                    tbody.innerHTML += `
                        <tr class="border-b border-gray-800 opacity-50">
                            <td class="py-3 text-gray-500">${slot}</td>
                            <td class="py-3 text-gray-600 italic">Empty Slot</td>
                            <td class="py-3 text-gray-600 hidden md:table-cell">-</td>
                            <td class="py-3 text-right">-</td>
                        </tr>`;
                }
            }
        }

        function kickParticipant(slot) {
            if (pConnections[slot]) { pConnections[slot].send({ type: 'kicked' }); setTimeout(() => pConnections[slot].close(), 500); }
            delete pConnections[slot]; delete pData[slot]; renderDashboard();
        }

        function handleHostBuzz(slotId) {
            if (hostLocked) return;
            const p = pData[slotId];
            if (!p) return; 

            const now = Date.now();
            if (hostCooldowns[slotId] && (now - hostCooldowns[slotId] < HOST_COOLDOWN_SEC * 1000)) return;

            const lastBuzz = hostQueue.length > 0 ? hostQueue[hostQueue.length - 1] : null;
            if (lastBuzz && lastBuzz.key === slotId) return; 

            hostQueue.push({ key: slotId, name: p.name, color: p.color, shadow: p.shadow });
            hostCooldowns[slotId] = now;

            playSound();

            if (hostCurrentIndex === -1) hostCurrentIndex = 0;
            updateHostUI();
        }

        function goNext() { if (hostCurrentIndex < hostQueue.length - 1) { hostCurrentIndex++; updateHostUI(); } }
        function goPrev() { if (hostCurrentIndex > 0) { hostCurrentIndex--; updateHostUI(); } }
        
        function resetQueue() {
            hostQueue = []; hostCurrentIndex = -1; hostCooldowns = {}; 
            if (!hostLocked) toggleLock(); else updateHostUI();
        }

        function toggleLock() {
            hostLocked = !hostLocked;
            const btn = document.getElementById('lock-btn');
            if (hostLocked) {
                btn.innerHTML = '🔒 LOCKED';
                btn.className = "flex-1 md:flex-none h-12 md:h-14 px-2 md:px-8 flex items-center justify-center bg-red-950 bg-opacity-30 text-red-500 border border-red-800 font-bold text-xs md:text-xl rounded-lg md:rounded-xl hover:bg-opacity-50 transition-all tracking-widest uppercase";
            } else {
                btn.innerHTML = '🔓 UNLOCKED';
                btn.className = "flex-1 md:flex-none h-12 md:h-14 px-2 md:px-8 flex items-center justify-center bg-green-950 bg-opacity-30 text-green-500 border border-green-800 font-bold text-xs md:text-xl rounded-lg md:rounded-xl hover:bg-opacity-50 transition-all tracking-widest uppercase";
            }
            broadcastState(); updateHostUI();
        }

        // Host Keyboard bindings
        document.addEventListener('keydown', (e) => {
            if (e.repeat || document.getElementById('host-screen').classList.contains('hidden')) return;
            if (e.code === 'Space') { e.preventDefault(); toggleLock(); }
            else if (e.code === 'ArrowRight' || e.code === 'KeyN') goNext();
            else if (e.code === 'ArrowLeft' || e.code === 'KeyP') goPrev();
            else if (e.code === 'Escape' || e.code === 'KeyR') resetQueue();
        });

        function getDynamicFontSize(name, isMain) {
            const len = name.length;
            if (isMain) {
                if (len <= 4) return "min(20vw, 22vh)";
                if (len <= 8) return "min(12vw, 15vh)";
                if (len <= 14) return "min(7vw, 10vh)";
                return "min(4.5vw, 6.5vh)"; 
            } else {
                if (len <= 4) return "min(8vw, 8vh)";
                if (len <= 8) return "min(5vw, 5vh)";
                if (len <= 14) return "min(3vw, 3.5vh)";
                return "min(2vw, 2.5vh)"; 
            }
        }

        function updateHostUI() {
            const prevEl = document.getElementById('prev-card');
            const mainEl = document.getElementById('main-card');
            const nextEl = document.getElementById('next-card');
            const queueListEl = document.getElementById('queue-list');

            if (hostQueue.length === 0) {
                queueListEl.innerHTML = '<span class="text-gray-700 font-mono tracking-widest text-xs md:text-sm">EMPTY</span>';
                
                mainEl.className = "order-1 md:order-2 w-full md:flex-1 md:min-w-[40%] md:max-w-[70%] h-[40vh] md:h-[100%] max-h-[95%] flex flex-col items-center justify-center rounded-[2rem] md:rounded-[3rem] transition-all duration-300 relative overflow-hidden border-2 border-dashed border-gray-800 bg-black bg-opacity-50 spotlight-active px-4";
                mainEl.style.removeProperty('--team-color');
                mainEl.style.removeProperty('--team-shadow');

                if (hostLocked) {
                    mainEl.innerHTML = `
                        <button onclick="toggleLock()" class="px-6 md:px-16 py-6 md:py-8 bg-red-950 bg-opacity-40 border-2 border-red-600 rounded-3xl shadow-[0_0_30px_rgba(239,68,68,0.4)] hover:shadow-[0_0_60px_rgba(239,68,68,0.7)] transition-all flex flex-col items-center gap-2 md:gap-4 cursor-pointer w-full max-w-[90%] md:w-auto">
                            <span class="text-4xl md:text-6xl font-black text-red-500 tracking-widest text-center">LOCKED</span>
                            <span class="text-[10px] md:text-xl font-mono text-red-400 tracking-[0.2em] md:tracking-[0.3em] opacity-80 text-center">TAP HERE / PRESS [SPACE] TO UNLOCK</span>
                        </button>
                    `;
                } else {
                    mainEl.innerHTML = `
                        <button onclick="toggleLock()" class="px-6 md:px-16 py-6 md:py-8 bg-green-950 bg-opacity-20 border-2 border-green-800 rounded-3xl shadow-[0_0_30px_rgba(34,197,94,0.2)] transition-all flex flex-col items-center cursor-pointer w-full max-w-[90%] md:w-auto">
                            <span class="text-4xl md:text-6xl font-black text-green-500 tracking-widest text-center">SYSTEM LIVE</span>
                        </button>
                    `;
                }
                
                prevEl.className = "order-2 md:order-1 w-[48%] md:w-auto md:flex-[0.4] md:min-w-[15%] md:max-w-[25%] h-[18vh] md:h-[65%] px-2 md:px-6 flex flex-col items-center justify-center rounded-2xl md:rounded-3xl transition-all duration-500 hide-card";
                nextEl.className = "order-3 md:order-3 w-[48%] md:w-auto md:flex-[0.4] md:min-w-[15%] md:max-w-[25%] h-[18vh] md:h-[65%] px-2 md:px-6 flex flex-col items-center justify-center rounded-2xl md:rounded-3xl transition-all duration-500 hide-card";
                return;
            }

            queueListEl.innerHTML = hostQueue.map((item, idx) => `
                <div class="px-3 md:px-5 h-8 md:h-12 flex-shrink-0 flex items-center justify-center rounded-lg md:rounded-xl text-sm md:text-xl font-black transition-all duration-300 ${idx === hostCurrentIndex ? 'border-2 md:border-4 scale-110' : 'border-2 opacity-50'}"
                     style="background-color: ${item.color}20; color: ${item.color}; border-color: ${item.color}; box-shadow: ${idx === hostCurrentIndex ? '0 0 15px ' + item.shadow : 'none'}">
                    ${item.name}
                </div>
            `).join('');

            const cItem = hostQueue[hostCurrentIndex];
            const pItem = hostCurrentIndex > 0 ? hostQueue[hostCurrentIndex - 1] : null;
            const nItem = hostCurrentIndex < hostQueue.length - 1 ? hostQueue[hostCurrentIndex + 1] : null;

            mainEl.className = "order-1 md:order-2 w-full md:flex-1 md:min-w-[40%] md:max-w-[70%] h-[40vh] md:h-[100%] max-h-[95%] flex flex-col items-center justify-center rounded-[2rem] md:rounded-[3rem] transition-all duration-300 relative overflow-hidden neon-box-main z-10 spotlight-active px-4";
            mainEl.style.setProperty('--team-color', cItem.color);
            mainEl.style.setProperty('--team-shadow', cItem.shadow);
            mainEl.innerHTML = `<div class="text-glow font-black leading-none text-center w-full" style="font-size: ${getDynamicFontSize(cItem.name, true)}; white-space: nowrap; line-height: 1;">${cItem.name}</div>`;

            if (pItem) {
                prevEl.className = "order-2 md:order-1 w-[48%] md:w-auto md:flex-[0.4] md:min-w-[15%] md:max-w-[25%] h-[18vh] md:h-[65%] px-2 md:px-6 flex flex-col items-center justify-center rounded-2xl md:rounded-3xl transition-all duration-500 neon-box show-card";
                prevEl.style.setProperty('--team-color', pItem.color);
                prevEl.style.setProperty('--team-shadow', pItem.shadow);
                prevEl.innerHTML = `<div class="text-glow font-black opacity-80 text-center w-full" style="font-size: ${getDynamicFontSize(pItem.name, false)}; white-space: nowrap; line-height: 1;">${pItem.name}</div>`;
            } else { prevEl.className = "order-2 md:order-1 w-[48%] md:w-auto md:flex-[0.4] md:min-w-[15%] md:max-w-[25%] h-[18vh] md:h-[65%] px-2 md:px-6 flex flex-col items-center justify-center rounded-2xl md:rounded-3xl transition-all duration-500 hide-card"; }

            if (nItem) {
                nextEl.className = "order-3 md:order-3 w-[48%] md:w-auto md:flex-[0.4] md:min-w-[15%] md:max-w-[25%] h-[18vh] md:h-[65%] px-2 md:px-6 flex flex-col items-center justify-center rounded-2xl md:rounded-3xl transition-all duration-500 neon-box show-card";
                nextEl.style.setProperty('--team-color', nItem.color);
                nextEl.style.setProperty('--team-shadow', nItem.shadow);
                nextEl.innerHTML = `<div class="text-glow font-black opacity-80 text-center w-full" style="font-size: ${getDynamicFontSize(nItem.name, false)}; white-space: nowrap; line-height: 1;">${nItem.name}</div>`;
            } else { nextEl.className = "order-3 md:order-3 w-[48%] md:w-auto md:flex-[0.4] md:min-w-[15%] md:max-w-[25%] h-[18vh] md:h-[65%] px-2 md:px-6 flex flex-col items-center justify-center rounded-2xl md:rounded-3xl transition-all duration-500 hide-card"; }
        }

        // ==========================================
        // PARTICIPANT LOGIC
        // ==========================================
        let partPeer = null;
        let partConn = null;
        let partLocked = true;
        let partColor = '#333333';

        function showPartError(msg) {
            document.getElementById('error-msg').innerText = msg;
            document.getElementById('join-btn').innerText = "CONNECT TO HOST";
        }

        function connectToHost() {
            const hostCode = document.getElementById('input-code').value.trim().toUpperCase();
            const teamName = document.getElementById('input-name').value.trim();
            const slot = document.getElementById('input-slot').value;

            if (!hostCode || !teamName) { showPartError("Please fill all fields."); return; }
            
            document.getElementById('join-btn').innerText = "CONNECTING...";
            document.getElementById('error-msg').innerText = "";

            if (partPeer) partPeer.destroy(); 
            partPeer = new Peer();

            partPeer.on('open', () => {
                const targetId = 'buzzer-host-' + hostCode;
                partConn = partPeer.connect(targetId, { reliable: true });

                partConn.on('open', () => { partConn.send({ type: 'join', slot: slot, name: teamName }); });

                partConn.on('data', (data) => {
                    if (data.type === 'accepted') {
                        partColor = data.color;
                        setupParticipantUI(teamName, data.locked);
                    } else if (data.type === 'rejected') {
                        showPartError(data.message); partConn.close();
                    } else if (data.type === 'state') {
                        setParticipantLock(data.locked);
                    } else if (data.type === 'kicked') {
                        alert("You were disconnected by the host."); location.reload();
                    }
                });

                partConn.on('close', () => { alert("Lost connection to host."); location.reload(); });
                partConn.on('error', () => { showPartError("Could not reach host."); });
            });
            partPeer.on('error', (err) => { showPartError("Network error. Try again."); console.error(err); });
        }

        function setupParticipantUI(name, initiallyLocked) {
            document.getElementById('participant-setup').classList.add('hidden');
            document.getElementById('participant-buzzer').classList.replace('hidden', 'flex');
            
            document.getElementById('display-name').innerText = name;
            
            // Set dynamic background to matched team color
            const scr = document.getElementById('participant-screen');
            scr.style.backgroundColor = partColor;
            scr.style.backgroundImage = `radial-gradient(circle, rgba(0,0,0,0.6) 2px, transparent 2px)`;
            scr.style.backgroundSize = `30px 30px`;

            setParticipantLock(initiallyLocked);
        }

        function setParticipantLock(locked) {
            partLocked = locked;
            const btn = document.getElementById('huge-buzzer');
            const text = document.getElementById('buzzer-text');
            const icon = document.getElementById('buzzer-icon');
            const status = document.getElementById('display-status');

            if (locked) {
                btn.style.backgroundColor = '#1a1a1a';
                btn.disabled = true;
                text.innerText = "LOCKED";
                status.innerText = "WAITING FOR HOST...";
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8V7a4 4 0 00-8 0v4h8z" />`;
            } else {
                btn.style.backgroundColor = partColor;
                btn.disabled = false;
                text.innerText = "BUZZ!";
                status.innerText = "SYSTEM LIVE - READY";
                icon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />`;
            }
        }

        function sendBuzz() {
            if (partLocked || !partConn || !partConn.open) return;
            
            if (navigator.vibrate) navigator.vibrate(100);
            
            // Play sound locally on the participant's phone!
            playSound();

            partConn.send({ type: 'buzz' });
            
            const btn = document.getElementById('huge-buzzer');
            const originalColor = btn.style.backgroundColor;
            btn.style.backgroundColor = '#ffffff';
            setTimeout(() => { btn.style.backgroundColor = originalColor; }, 150);
        }
    </script>
</body>
